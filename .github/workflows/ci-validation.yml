name: CI Validation

# Diagram steps 5-6: scheduled CI validation on the DEV branch + PR gate into MAIN.
# On failure, an alert email is sent to the dev team (step 5 FAIL -> Alert Email).

on:
  push:
    branches: [dev]
    paths-ignore:
      - '**.md'
      - 'documents/**'
      - '.github/workflows/claude*.yml'
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 18 * * *'   # nightly scheduled CI validation (step 5)
  workflow_dispatch:

defaults:
  run:
    working-directory: core-leo-cdp

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      arangodb:
        image: arangodb:3.11
        env:
          ARANGO_ROOT_PASSWORD: testpass
        ports: ['8529:8529']
      redis:
        image: redis:6
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11 (Corretto)
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '11'

      - name: Set up Gradle 6.9.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '6.9.4'   # no wrapper in repo; legacy 'maven' plugin needs Gradle 6.x

      - name: Build & unit tests
        run: gradle compileJava test

      # Code quality check (step 5, bullet 2). Swap in your linter/static analysis of choice.
      - name: Code quality
        run: gradle check -x test

      # Integration tests need ArangoDB/Redis reachable + a leocdp-metadata.properties.
      # Tag tests unit vs integration, then wire a `gradle integrationTest` task here.
      - name: Integration tests
        env:
          ARANGODB_HOST: localhost
          ARANGODB_PORT: '8529'
          ARANGODB_USERNAME: root
          ARANGODB_PASSWORD: testpass
          ARANGODB_DATABASE: leocdp
        run: 'echo "TODO: gradle integrationTest once tests are split unit vs integration"'

      - name: Validation summary
        if: always()
        run: |
          {
            echo "## CI Validation"
            echo "**Branch:** ${{ github.ref_name }}"
            echo "**Commit:** ${{ github.sha }}"
            echo "**Event:** ${{ github.event_name }}"
          } >> "$GITHUB_STEP_SUMMARY"

  alert-on-failure:        # step 5 FAIL -> Alert Email (Dev Team / Bug Report)
    needs: validate
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "CI FAILED - ${{ github.repository }} (${{ github.ref_name }})"
          to: ${{ secrets.DEV_TEAM_EMAILS }}
          from: LEO CDP CI <ci@leocdp.com>
          body: |
            Validation failed on ${{ github.ref_name }} (${{ github.sha }}).
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
