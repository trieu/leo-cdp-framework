name: Claude Code Review

# Automatic AI code review on every PR (supports both same-repo and fork PRs).
# Requires the CLAUDE_CODE_OAUTH_TOKEN secret.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  pull_request_target:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  check-secret:                 # skip the whole workflow gracefully if no token is configured
    runs-on: ubuntu-latest
    outputs:
      has_token: ${{ steps.c.outputs.has_token }}
    steps:
      - id: c
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [[ -n "$TOKEN" ]]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false (CLAUDE_CODE_OAUTH_TOKEN not set) - skipping" >> "$GITHUB_STEP_SUMMARY"
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

  claude-review:
    needs: check-secret
    # fork PRs via pull_request_target, same-repo PRs via pull_request — never both
    if: |
      needs.check-secret.outputs.has_token == 'true' && (
      (github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository) ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
