name: Docker Build, Test & Publish (core-leo-cdp)

# Single self-contained pipeline for core-leo-cdp:
#   1. Build the Docker image, running the JUnit suite INSIDE the build (Dockerfile `test` stage).
#   2. Export the JUnit XML out of the build and publish it as a GitHub test report + artifact.
#   3. Publish the runtime image to GHCR tagged with the commit it was built from (full + short SHA).
#
# Tests run via the Dockerfile multi-stage `test` / `test-export` stages; the in-build test step is
# failure-tolerant (many test.** classes need a live ArangoDB/Redis and can't reach them from inside
# buildx), so results are reported from the exported XML rather than gating the build.

on:
  push:
    branches: [main, dev]
    paths:
      - 'core-leo-cdp/**'
      - '.github/workflows/docker-build-test-publish.yml'
  pull_request:
    branches: [main]
    paths:
      - 'core-leo-cdp/**'
      - '.github/workflows/docker-build-test-publish.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write          # push to GHCR
  checks: write            # publish the JUnit test report as a check
  pull-requests: write     # surface the test report on PRs

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Commit the image is built from -> image tags (full SHA + short SHA).
      - name: Derive commit tags
        id: meta
        run: |
          echo "sha=${GITHUB_SHA}"          >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # --- step 1+2: build with tests, export JUnit XML to ./test-results ---
      - name: Build & run tests (export JUnit XML)
        run: |
          docker buildx build \
            --target test-export \
            --output type=local,dest=./test-results \
            --file ./core-leo-cdp/Dockerfile \
            ./core-leo-cdp
          echo "Exported test reports:"
          find ./test-results -name '*.xml' -print || true

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: JUnit Tests (core-leo-cdp)
          path: 'test-results/**/*.xml'
          reporter: java-junit
          fail-on-error: false      # tests needing live DB/Redis can't run inside buildx; don't fail the run

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: test-results/**/*.xml
          if-no-files-found: warn

      # --- step 3: publish runtime image tagged with the commit ---
      - name: Log in to GHCR
        # skip the push on PRs from forks (no package write); build/test still ran above
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image (tagged with commit SHA)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./core-leo-cdp
          file: ./core-leo-cdp/Dockerfile
          # default target = runtime stage (last stage in the Dockerfile)
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.sha }}
            ${{ env.IMAGE }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        if: always()
        run: |
          {
            echo "## Docker Build, Test & Publish"
            echo "**Commit:** \`${{ steps.meta.outputs.sha }}\`"
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              echo "**Image:** not pushed (pull_request build)"
            else
              echo "**Image tags:**"
              echo "- \`${{ env.IMAGE }}:${{ steps.meta.outputs.sha }}\`"
              echo "- \`${{ env.IMAGE }}:${{ steps.meta.outputs.short_sha }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
