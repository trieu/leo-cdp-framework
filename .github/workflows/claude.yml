name: Claude Code

# Interactive assistant: mention @claude in an issue, PR review, or comment and
# Claude Code runs against the repo. Requires the CLAUDE_CODE_OAUTH_TOKEN secret.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  check-secret:                 # skip the whole workflow gracefully if no token is configured
    runs-on: ubuntu-latest
    outputs:
      has_token: ${{ steps.c.outputs.has_token }}
    steps:
      - id: c
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [[ -n "$TOKEN" ]]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false (CLAUDE_CODE_OAUTH_TOKEN not set) - skipping" >> "$GITHUB_STEP_SUMMARY"
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

  claude:
    needs: check-secret
    if: |
      needs.check-secret.outputs.has_token == 'true' && (
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read   # lets Claude read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
