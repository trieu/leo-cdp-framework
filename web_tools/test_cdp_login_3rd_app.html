<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Data Hub Login</title>
  </head>
  <body>
    <div id="app"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lscache/1.3.2/lscache.min.js"></script>
    <script src="cdp-profile-auth.js"></script>
    <script>
      $(document).ready(function () {
        // Initialize DataHubAuth with your API URLs and container ID
        DataHubAuth.init({
          loginUrl: "http://0.0.0.0:8000/api/profile/login",
          apiUrl: "http://0.0.0.0:8000/api/event/list",
          containerId: "app",
        });
      });
    </script>
  </body>
</html>
