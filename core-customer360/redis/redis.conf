# Baseline config for using Redis purely as an API response cache.
# `requirepass` is intentionally NOT set here -- it's passed at runtime via
# `--requirepass` (docker-compose.yml `command:`) from REDIS_PASSWORD in .env.

# Persist the cache across restarts (avoids a large cold-cache stampede on
# every deploy); safe to disable if you'd rather treat this purely as a
# volatile, restart-clears-everything cache.
appendonly yes
appendfsync everysec

# Bound memory usage and evict least-recently-used keys once full -- correct
# policy for a cache (as opposed to Redis-as-primary-datastore).
maxmemory 256mb
maxmemory-policy allkeys-lru

protected-mode yes
